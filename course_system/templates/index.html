<!DOCTYPE html>
<html>
<head>
    <title>選課系統</title>
</head>
<body>

<h1>課程列表</h1>

<table border="1">

<tr>
    <th>課號</th>
    <th>課名</th>
    <th>學分</th>
</tr>

{% for course in courses %}
<tr>
    <td>{{ course.course_id }}</td>
    <td>{{ course.name }}</td>
    <td>{{ course.credits }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
