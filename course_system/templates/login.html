<!DOCTYPE html>
<html>
<head>
    <title>用戶登入</title>
</head>
<body>

    <h2>用戶登入</h2>

    <form action="/login" method="POST">

        身份：
        <select name="role" required>
            <option value="student">學生</option>
            <option value="teacher">老師</option>
        </select>

        <br><br>

        <!-- 學生帳號 -->
        <div id="student_field">
            學號：
            <input type="text" name="student_id">
        </div>

        <!-- 老師帳號 -->
        <div id="teacher_field" style="display:none;">
            老師ID：
            <input type="text" name="teacher_id">
        </div>

        <br><br>

        密碼：
        <input type="password" name="password" required>

        <br><br>

        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary w-50">登入</button>
            
            <button type="button" class="btn btn-secondary w-50 py-2" onclick="window.location.href='/'">返回主頁</button>
        </div>

    </form>

    <script>
        // 切換身份時顯示對應的帳號欄位
        const roleSelect = document.querySelector("select[name='role']");
        const studentField = document.getElementById("student_field");
        const teacherField = document.getElementById("teacher_field");

        roleSelect.addEventListener("change", function() {
            if (this.value === "student") {
                studentField.style.display = "block";
                teacherField.style.display = "none";
            } else {
                studentField.style.display = "none";
                teacherField.style.display = "block";
            }
        });
    </script>

</body>
</html>
