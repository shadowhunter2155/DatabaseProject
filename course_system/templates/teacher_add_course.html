<form method="post">
    課程代碼: <input type="text" name="course_id"><br>
    課程名稱: <input type="text" name="name"><br>
    學分數: <input type="number" name="credits"><br>
    系所: <input type="text" name="dept_name"><br>
    先修課程 (可多選):<br>
    {% for c in courses %}
    <input type="checkbox" name="prereqs" value="{{ c.course_id }}"> {{ c.name }}<br>
    {% endfor %}
    <button type="submit">新增課程</button>
</form>
